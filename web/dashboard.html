<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regatta Screen — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="dashboard-page">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <svg width="32" height="32" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#0f172a"/>
        <path d="M22 8 L22 34" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 10 L10 30 L22 30 Z" fill="#3b82f6" fill-opacity=".85"/>
        <path d="M22 14 L34 30 L22 30 Z" fill="#22c55e" fill-opacity=".85"/>
        <path d="M8 36 L36 36" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Regatta Screen
    </div>
    <div class="header-user">
      <span id="user-email">—</span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Uitloggen</button>
    </div>
  </header>

  <!-- Content -->
  <main class="dashboard-content">
    <div class="dashboard-header">
      <h2>Mijn races</h2>
    </div>

    <!-- Loading state -->
    <div id="tracks-loading" style="display:flex;align-items:center;gap:12px;color:var(--text-muted);padding:40px 0;">
      <span class="spinner"></span>
      <span>Tracks laden…</span>
    </div>

    <!-- Error state -->
    <div id="tracks-error" style="display:none;color:#fecaca;padding:20px 0;"></div>

    <!-- Empty state -->
    <div id="tracks-empty" style="display:none;">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 10 L32 50" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
          <path d="M32 12 L14 40 L32 40 Z" fill="#94a3b8"/>
          <path d="M32 18 L50 40 L32 40 Z" fill="#94a3b8"/>
          <path d="M10 54 L54 54" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h3>Nog geen races opgeslagen</h3>
        <p>Start een race in de Regatta Screen app en je tracks verschijnen hier automatisch.</p>
      </div>
    </div>

    <!-- Race grid -->
    <div id="race-grid" class="race-grid" style="display:none;"></div>

  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  const API = 'https://regatta.fhettinga.nl/api';

  // ── Auth check ────────────────────────────────────────────────────────────
  const token = localStorage.getItem('regatta_token');
  const email = localStorage.getItem('regatta_email');

  if (!token) {
    window.location.replace('index.html');
  }

  document.getElementById('user-email').textContent = email || '—';

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('regatta_token');
    localStorage.removeItem('regatta_email');
    window.location.replace('index.html');
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function formatDuration(seconds) {
    if (seconds == null) return '—';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function formatDistance(meters) {
    if (meters == null) return '—';
    if (meters >= 1000) return (meters / 1000).toFixed(2) + ' km';
    return Math.round(meters) + ' m';
  }

  function formatSpeed(knots) {
    if (knots == null) return '—';
    return knots.toFixed(1) + ' kts';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  }

  function degToCompass(deg) {
    if (deg == null) return null;
    const dirs = ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  // Wind arrow SVG (pointing in the given direction)
  function windArrowSvg(deg, size = 16) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"
      style="transform:rotate(${deg}deg);display:block;">
      <path d="M8 2 L8 14" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
      <path d="M5 5 L8 2 L11 5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  // ── Render tracks ─────────────────────────────────────────────────────────
  function renderTracks(tracks) {
    const grid = document.getElementById('race-grid');
    grid.innerHTML = '';

    for (const track of tracks) {
      const card = document.createElement('div');
      card.className = 'race-card';
      card.dataset.id = track.id;

      const windHtml = track.wind_direction_deg != null
        ? `<div class="stat-item">
             <span class="stat-label">Wind</span>
             <div class="wind-stat">
               <div class="wind-stat-arrow">${windArrowSvg(track.wind_direction_deg, 14)}</div>
               <span class="stat-value">${Math.round(track.wind_direction_deg)}° ${degToCompass(track.wind_direction_deg) || ''}</span>
             </div>
           </div>`
        : '';

      card.innerHTML = `
        <div class="race-card-header">
          <div>
            <div class="race-card-title">${escapeHtml(track.name)}</div>
            <div class="race-card-date">${formatDate(track.recorded_at)}</div>
          </div>
          <button class="race-card-delete" title="Verwijderen" data-id="${track.id}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
              <path d="M10 11v6M14 11v6"></path>
              <path d="M9 6V4h6v2"></path>
            </svg>
          </button>
        </div>
        <div class="race-stats">
          <div class="stat-item">
            <span class="stat-label">Duur</span>
            <span class="stat-value">${formatDuration(track.duration_seconds)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Afstand</span>
            <span class="stat-value">${formatDistance(track.distance_meters)}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Max snelheid</span>
            <span class="stat-value accent">${formatSpeed(track.max_speed_knots)}</span>
          </div>
          ${windHtml}
        </div>
      `;

      // Click card body → navigate (but not the delete button)
      card.addEventListener('click', (e) => {
        if (e.target.closest('.race-card-delete')) return;
        window.location.href = `race.html?id=${track.id}`;
      });

      // Delete button
      card.querySelector('.race-card-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTrack(track.id, track.name, card);
      });

      grid.appendChild(card);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function deleteTrack(id, name, cardEl) {
    if (!confirm(`Weet je zeker dat je "${name}" wilt verwijderen?`)) return;

    try {
      const res = await fetch(`${API}/tracks/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showToast(data.error || 'Kon track niet verwijderen.', 'error');
        return;
      }

      cardEl.style.transition = 'opacity .2s, transform .2s';
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'scale(.95)';
      setTimeout(() => {
        cardEl.remove();
        // Check if grid is now empty
        if (document.getElementById('race-grid').children.length === 0) {
          document.getElementById('race-grid').style.display = 'none';
          document.getElementById('tracks-empty').style.display = 'block';
        }
      }, 200);

      showToast('Track verwijderd.', 'success');
    } catch (err) {
      showToast('Verbindingsfout bij verwijderen.', 'error');
    }
  }

  // ── Load tracks ───────────────────────────────────────────────────────────
  async function loadTracks() {
    try {
      const res = await fetch(`${API}/tracks`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (res.status === 401) {
        localStorage.removeItem('regatta_token');
        localStorage.removeItem('regatta_email');
        window.location.replace('index.html');
        return;
      }

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const tracks = await res.json();

      document.getElementById('tracks-loading').style.display = 'none';

      if (tracks.length === 0) {
        document.getElementById('tracks-empty').style.display = 'block';
      } else {
        document.getElementById('race-grid').style.display = 'grid';
        renderTracks(tracks);
      }

    } catch (err) {
      document.getElementById('tracks-loading').style.display = 'none';
      document.getElementById('tracks-error').style.display = 'block';
      document.getElementById('tracks-error').textContent =
        'Kon tracks niet laden: ' + err.message;
    }
  }

  loadTracks();
</script>

</body>
</html>
