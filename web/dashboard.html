<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regatta Screen — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="dashboard-page">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <svg width="32" height="32" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#0f172a"/>
        <path d="M22 8 L22 34" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 10 L10 30 L22 30 Z" fill="#3b82f6" fill-opacity=".85"/>
        <path d="M22 14 L34 30 L22 30 Z" fill="#22c55e" fill-opacity=".85"/>
        <path d="M8 36 L36 36" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Regatta Screen
    </div>
    <div class="header-user">
      <span id="user-email">—</span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Uitloggen</button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tracks">Mijn tracks</button>
    <button class="tab-btn" data-tab="races">Wedstrijden</button>
    <button class="tab-btn tab-admin" data-tab="admin" style="display:none">Beheer</button>
  </div>

  <!-- Content -->
  <main class="dashboard-content">

    <!-- ── Tab: Tracks ─────────────────────────────────────────────────── -->
    <div id="tab-tracks">
      <div id="tracks-loading" style="display:flex;align-items:center;gap:12px;color:var(--text-muted);padding:40px 0;">
        <span class="spinner"></span><span>Tracks laden…</span>
      </div>
      <div id="tracks-error" style="display:none;color:#fecaca;padding:20px 0;"></div>
      <div id="tracks-empty" style="display:none;">
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><path d="M32 10 L32 50" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/><path d="M32 12 L14 40 L32 40 Z" fill="#94a3b8"/><path d="M32 18 L50 40 L32 40 Z" fill="#94a3b8"/><path d="M10 54 L54 54" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/></svg>
          <h3>Nog geen races opgeslagen</h3>
          <p>Start een race in de Regatta Screen app en je tracks verschijnen hier automatisch.</p>
        </div>
      </div>
      <div id="race-grid" class="race-grid" style="display:none;"></div>
    </div>

    <!-- ── Tab: Wedstrijden ────────────────────────────────────────────── -->
    <div id="tab-races" style="display:none;">
      <div id="races-loading" style="display:flex;align-items:center;gap:12px;color:var(--text-muted);padding:40px 0;">
        <span class="spinner"></span><span>Wedstrijden laden…</span>
      </div>
      <div id="races-empty" style="display:none;">
        <div class="empty-state">
          <h3>Geen wedstrijden</h3>
          <p>Er zijn nog geen wedstrijden aangemaakt.</p>
        </div>
      </div>
      <div id="races-list" style="display:none;"></div>
    </div>

    <!-- ── Tab: Beheer (admin) ─────────────────────────────────────────── -->
    <div id="tab-admin" style="display:none;">
      <div class="admin-card">
        <h3>Wedstrijd aanmaken</h3>
        <div id="race-form-error" class="form-error" style="display:none;"></div>
        <div class="field">
          <label for="race-name">Naam</label>
          <input type="text" id="race-name" placeholder="bijv. Zeilwedstrijd Sneekweek 2026" />
        </div>
        <div class="field">
          <label for="race-date">Datum</label>
          <input type="date" id="race-date" />
        </div>
        <div class="field">
          <label for="race-desc">Omschrijving (optioneel)</label>
          <input type="text" id="race-desc" placeholder="bijv. Klasse A, start 10:00" />
        </div>
        <button class="btn btn-primary" id="create-race-btn">
          <span id="create-race-label">Wedstrijd aanmaken</span>
          <span id="create-race-spinner" class="spinner" style="display:none;"></span>
        </button>
      </div>

      <div style="margin-top:32px;">
        <h3 style="margin-bottom:12px;font-size:1rem;color:var(--text-muted);">Bestaande wedstrijden</h3>
        <div id="admin-races-list"></div>
      </div>
    </div>

  </main>
</div>

<div id="toast-container"></div>

<script>
  const API = 'https://regatta.fhettinga.nl/api';
  const token = localStorage.getItem('regatta_token');
  const email = localStorage.getItem('regatta_email');
  let isAdmin = false;

  if (!token) window.location.replace('index.html');

  document.getElementById('user-email').textContent = email || '—';

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('regatta_token');
    localStorage.removeItem('regatta_email');
    window.location.replace('index.html');
  });

  // ── Tabs ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['tracks', 'races', 'admin'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = 'none';
      });
      const tab = btn.dataset.tab;
      document.getElementById(`tab-${tab}`).style.display = 'block';
      if (tab === 'races') loadRaces();
      if (tab === 'admin') loadAdminRaces();
    });
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function formatDuration(s) {
    if (s == null) return '—';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function formatDistance(m) {
    if (m == null) return '—';
    return m >= 1000 ? (m/1000).toFixed(2)+' km' : Math.round(m)+' m';
  }
  function formatSpeed(k) { return k != null ? k.toFixed(1)+' kts' : '—'; }
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'})
      +' '+d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  }
  function degToCompass(deg) {
    if (deg == null) return null;
    const dirs = ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg/22.5)%16];
  }
  function windArrowSvg(deg, size=16) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="none"
      style="transform:rotate(${deg}deg);display:block;">
      <path d="M8 2 L8 14" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
      <path d="M5 5 L8 2 L11 5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  // ── Auth: check admin ─────────────────────────────────────────────────────
  async function checkMe() {
    try {
      const res = await fetch(`${API}/auth/me`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { localStorage.clear(); window.location.replace('index.html'); return; }
      const data = await res.json();
      isAdmin = !!data.isAdmin;
      if (isAdmin) {
        document.querySelector('.tab-admin').style.display = 'inline-block';
      }
    } catch (_) {}
  }

  // ── Tab: Tracks ───────────────────────────────────────────────────────────
  async function loadTracks() {
    try {
      const res = await fetch(`${API}/tracks`, { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { localStorage.clear(); window.location.replace('index.html'); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const tracks = await res.json();
      document.getElementById('tracks-loading').style.display = 'none';
      if (tracks.length === 0) {
        document.getElementById('tracks-empty').style.display = 'block';
      } else {
        document.getElementById('race-grid').style.display = 'grid';
        renderTracks(tracks);
      }
    } catch (err) {
      document.getElementById('tracks-loading').style.display = 'none';
      document.getElementById('tracks-error').style.display = 'block';
      document.getElementById('tracks-error').textContent = 'Kon tracks niet laden: ' + err.message;
    }
  }

  function renderTracks(tracks) {
    const grid = document.getElementById('race-grid');
    grid.innerHTML = '';
    for (const track of tracks) {
      const windHtml = track.wind_direction_deg != null
        ? `<div class="stat-item"><span class="stat-label">Wind</span>
             <div class="wind-stat"><div class="wind-stat-arrow">${windArrowSvg(track.wind_direction_deg,14)}</div>
             <span class="stat-value">${Math.round(track.wind_direction_deg)}° ${degToCompass(track.wind_direction_deg)||''}</span></div></div>`
        : '';
      const card = document.createElement('div');
      card.className = 'race-card';
      card.innerHTML = `
        <div class="race-card-header">
          <div><div class="race-card-title">${escapeHtml(track.name)}</div>
          <div class="race-card-date">${formatDate(track.recorded_at)}</div></div>
          <button class="race-card-delete" title="Verwijderen" data-id="${track.id}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
              <path d="M10 11v6M14 11v6M9 6V4h6v2"></path>
            </svg>
          </button>
        </div>
        <div class="race-stats">
          <div class="stat-item"><span class="stat-label">Duur</span><span class="stat-value">${formatDuration(track.duration_seconds)}</span></div>
          <div class="stat-item"><span class="stat-label">Afstand</span><span class="stat-value">${formatDistance(track.distance_meters)}</span></div>
          <div class="stat-item"><span class="stat-label">Max snelheid</span><span class="stat-value accent">${formatSpeed(track.max_speed_knots)}</span></div>
          ${windHtml}
        </div>`;
      card.addEventListener('click', e => {
        if (e.target.closest('.race-card-delete')) return;
        window.location.href = `race.html?id=${track.id}`;
      });
      card.querySelector('.race-card-delete').addEventListener('click', e => {
        e.stopPropagation();
        deleteTrack(track.id, track.name, card);
      });
      grid.appendChild(card);
    }
  }

  async function deleteTrack(id, name, cardEl) {
    if (!confirm(`Weet je zeker dat je "${name}" wilt verwijderen?`)) return;
    try {
      const res = await fetch(`${API}/tracks/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { showToast((await res.json()).error || 'Kon track niet verwijderen.', 'error'); return; }
      cardEl.style.transition = 'opacity .2s, transform .2s';
      cardEl.style.opacity = '0';
      cardEl.style.transform = 'scale(.95)';
      setTimeout(() => {
        cardEl.remove();
        if (!document.getElementById('race-grid').children.length) {
          document.getElementById('race-grid').style.display = 'none';
          document.getElementById('tracks-empty').style.display = 'block';
        }
      }, 200);
      showToast('Track verwijderd.', 'success');
    } catch { showToast('Verbindingsfout bij verwijderen.', 'error'); }
  }

  // ── Tab: Wedstrijden ──────────────────────────────────────────────────────
  async function loadRaces() {
    document.getElementById('races-loading').style.display = 'flex';
    document.getElementById('races-empty').style.display = 'none';
    document.getElementById('races-list').style.display = 'none';
    try {
      const res = await fetch(`${API}/races`, { headers: { Authorization: `Bearer ${token}` } });
      const races = await res.json();
      document.getElementById('races-loading').style.display = 'none';
      if (!races.length) { document.getElementById('races-empty').style.display = 'block'; return; }
      const list = document.getElementById('races-list');
      list.innerHTML = '';
      list.style.display = 'block';
      for (const r of races) {
        const el = document.createElement('div');
        el.className = 'race-card';
        el.style.cursor = 'default';
        el.innerHTML = `
          <div class="race-card-header">
            <div><div class="race-card-title">${escapeHtml(r.name)}</div>
            <div class="race-card-date">${r.race_date || '—'} · ${r.participant_count} deelnemer(s)</div></div>
          </div>
          ${r.description ? `<p style="color:var(--text-muted);font-size:.85rem;margin-top:4px">${escapeHtml(r.description)}</p>` : ''}`;
        list.appendChild(el);
      }
    } catch { document.getElementById('races-loading').style.display = 'none'; }
  }

  // ── Tab: Beheer ───────────────────────────────────────────────────────────
  async function loadAdminRaces() {
    const list = document.getElementById('admin-races-list');
    list.innerHTML = '<span style="color:var(--text-muted)">Laden…</span>';
    try {
      const res = await fetch(`${API}/races`, { headers: { Authorization: `Bearer ${token}` } });
      const races = await res.json();
      if (!races.length) { list.innerHTML = '<span style="color:var(--text-muted)">Geen wedstrijden.</span>'; return; }
      list.innerHTML = '';
      for (const r of races) {
        const el = document.createElement('div');
        el.className = 'race-card';
        el.style.cursor = 'default';
        el.innerHTML = `
          <div class="race-card-header">
            <div><div class="race-card-title">${escapeHtml(r.name)}</div>
            <div class="race-card-date">${r.race_date || '—'} · ${r.participant_count} deelnemer(s)</div></div>
            <button class="race-card-delete" title="Verwijderen" data-id="${r.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
                <path d="M10 11v6M14 11v6M9 6V4h6v2"></path>
              </svg>
            </button>
          </div>`;
        el.querySelector('.race-card-delete').addEventListener('click', () => deleteRace(r.id, r.name, el));
        list.appendChild(el);
      }
    } catch { list.innerHTML = '<span style="color:#fecaca">Fout bij laden.</span>'; }
  }

  document.getElementById('create-race-btn').addEventListener('click', async () => {
    const name = document.getElementById('race-name').value.trim();
    const date = document.getElementById('race-date').value;
    const desc = document.getElementById('race-desc').value.trim();
    const errEl = document.getElementById('race-form-error');
    errEl.style.display = 'none';

    if (!name) { errEl.textContent = 'Naam is verplicht.'; errEl.style.display = 'block'; return; }

    document.getElementById('create-race-label').style.display = 'none';
    document.getElementById('create-race-spinner').style.display = 'inline-block';
    document.getElementById('create-race-btn').disabled = true;

    try {
      const res = await fetch(`${API}/races`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, race_date: date || null, description: desc || null }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Aanmaken mislukt.'; errEl.style.display = 'block'; return; }
      showToast('Wedstrijd aangemaakt!', 'success');
      document.getElementById('race-name').value = '';
      document.getElementById('race-date').value = '';
      document.getElementById('race-desc').value = '';
      loadAdminRaces();
    } catch { errEl.textContent = 'Verbindingsfout.'; errEl.style.display = 'block'; }
    finally {
      document.getElementById('create-race-label').style.display = 'inline';
      document.getElementById('create-race-spinner').style.display = 'none';
      document.getElementById('create-race-btn').disabled = false;
    }
  });

  async function deleteRace(id, name, el) {
    if (!confirm(`Wedstrijd "${name}" verwijderen?`)) return;
    try {
      const res = await fetch(`${API}/races/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { showToast((await res.json()).error || 'Verwijderen mislukt.', 'error'); return; }
      el.remove();
      showToast('Wedstrijd verwijderd.', 'success');
    } catch { showToast('Verbindingsfout.', 'error'); }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  checkMe();
  loadTracks();
</script>

</body>
</html>
